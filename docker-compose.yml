services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: devassist
      POSTGRES_PASSWORD: devassist
      POSTGRES_DB: devassist
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
    depends_on:
      - backend
